name: Test Docker Builds

on:
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          images=$(find . -name Dockerfile -not -path './.git/*' \
            | xargs -I{} dirname {} | sed 's|^\./||' \
            | jq -R . | jq -sc .)
          echo "images=$images" >> $GITHUB_OUTPUT

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ matrix.image }}
          push: false

  ci-success:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all builds succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more image builds failed (build result: ${{ needs.build.result }})"
            exit 1
          fi
          echo "All image builds succeeded"
